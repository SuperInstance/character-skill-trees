[pytest]
# Pytest configuration for character-skill-trees

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=character_skill_trees
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml

# Coverage options
[coverage:run]
source = character_skill_trees
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_empty = True

[coverage:html]
directory = htmlcov

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
